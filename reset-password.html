<!doctype html><html lang="ru"><head><meta charset="utf-8" /><meta name="viewport" content="width=device-width,initial-scale=1" /><title>ШТАБ — новый пароль</title><link rel="stylesheet" href="assets/styles.css?v=202" /><script>(function(){try{var t=localStorage.getItem('shtab_theme_v1')||'light';document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script></head><body><div class="container"><div class="center-wrap"><div class="card center-card"><div class="auth-shell"><div class="auth-panel hero-panel"><div class="brand"><div class="brand-mark" aria-hidden="true"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="3.5"></circle><path d="M5 19c1.8-3.6 4.4-5.4 7-5.4s5.2 1.8 7 5.4"></path></svg></div><div class="brand-text"><strong>ШТАБ</strong><span>Создание нового пароля</span></div></div><h1 class="auth-title">Задайте новый пароль</h1><p class="auth-copy">Используйте надёжный пароль длиной не менее 8 символов. После обновления старые сессии будут завершены.</p></div><div class="auth-panel"><div class="brand" style="margin-bottom:16px"><div class="brand-mark" aria-hidden="true"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="3.5"></circle><path d="M5 19c1.8-3.6 4.4-5.4 7-5.4s5.2 1.8 7 5.4"></path></svg></div><div class="brand-text"><strong>Новый пароль</strong><span>Подтвердите смену</span></div></div><div class="field"><label>Новый пароль</label><input id="password" type="password" placeholder="Минимум 8 символов" /></div><div class="field"><label>Повторите пароль</label><input id="password2" type="password" placeholder="Повторите пароль" /></div><button class="btn btn-primary" style="width:100%;margin-top:14px" id="saveBtn">Сохранить пароль</button><div class="small" id="resetMsg" style="margin-top:14px"></div><div class="small" style="margin-top:14px"><a href="login.html">Вернуться ко входу</a></div></div></div></div></div></div><script>const API_BASE=(localStorage.getItem('shtab_api_base_v1')||'https://shtab-production.up.railway.app').replace(/\/$/,'');const token=new URLSearchParams(location.search).get('token')||'';const msg=document.getElementById('resetMsg');async function validate(){if(!token){msg.style.color='var(--danger,#ef4444)';msg.textContent='Ссылка недействительна';document.getElementById('saveBtn').disabled=true;return;}try{const res=await fetch(`${API_BASE}/api/v1/auth/reset-password/validate?token=${encodeURIComponent(token)}`);const data=await res.json().catch(()=>({}));if(!res.ok) throw new Error(data.detail||`HTTP ${res.status}`);}catch(e){msg.style.color='var(--danger,#ef4444)';msg.textContent=e.message||'Ссылка недействительна';document.getElementById('saveBtn').disabled=true;}}document.getElementById('saveBtn').addEventListener('click',async()=>{const p1=document.getElementById('password').value;const p2=document.getElementById('password2').value;msg.textContent='';if(p1.length<8){msg.style.color='var(--danger,#ef4444)';msg.textContent='Пароль должен содержать минимум 8 символов';return;}if(p1!==p2){msg.style.color='var(--danger,#ef4444)';msg.textContent='Пароли не совпадают';return;}try{const res=await fetch(`${API_BASE}/api/v1/auth/reset-password`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token:token,new_password:p1})});const data=await res.json().catch(()=>({}));if(!res.ok) throw new Error(data.detail||data.message||`HTTP ${res.status}`);msg.style.color='var(--success,#22c55e)';msg.textContent=data.message||'Пароль обновлён';setTimeout(()=>location.href='login.html',1200);}catch(e){msg.style.color='var(--danger,#ef4444)';msg.textContent=e.message||'Не удалось обновить пароль';}});validate();</script></body></html>
